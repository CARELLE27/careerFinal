version: '3.8'

services:
  db:
    image: postgres:15
    container_name: careerquest_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: careerquest
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: careerquest_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://admin:password123@db:5432/careerquest
      - SECRET_KEY=dev-secret-key-change-in-prod
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: careerquest_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
